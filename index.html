<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Monitoring</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        height: 100%;
        font-family: sans-serif;
        background: #050505;
    }

    /* IFRAME */
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
    }

    /* FALLBACK */
    #fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background: radial-gradient(circle at center, #0b0b0b, #050505);
    }

    .card {
        padding: 40px;
        border-radius: 16px;
        background: #111;
        border: 1px solid #333;
        box-shadow: 0 0 40px rgba(255, 75, 75, 0.15);
        text-align: center;
        max-width: 420px;
        width: 90%;
    }

    .status-dot {
        height: 12px;
        width: 12px;
        background-color: #ff4b4b;
        border-radius: 50%;
        margin: 0 auto 20px;
        box-shadow: 0 0 12px #ff4b4b;
        animation: blink 1.5s infinite;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    .card h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255, 75, 75, 0.3);
    }

    .card p {
        color: #888;
        font-size: 1rem;
    }

    @media (max-width: 600px) {
        .card {
            padding: 30px 20px;
        }

        .card h1 {
            font-size: 1.5rem;
        }
    }
</style>

</head>

<body>

<!-- FALLBACK -->
<div id="fallback">
    <div class="card">
        <div class="status-dot"></div>
        <h1>SERVER CLOSED</h1>
        <p>The monitoring server is currently offline.</p>
    </div>
</div>

<!-- GRAFANA -->
<iframe id="frame"></iframe>

<script>
fetch("config.json?t=" + Date.now())
  .then(res => res.json())
  .then(data => {
      const url = data.url;

      fetch(url, { mode: "no-cors" })
        .then(() => {
            document.getElementById("frame").src =
              url + "/d/sjdjcw9e0/monitoring-home-network?orgId=1&from=now-30m&to=now&timezone=browser&refresh=5s&kiosk=true";

            document.getElementById("fallback").style.display = "none";
            document.getElementById("frame").style.display = "block";
        })
        .catch(() => {
            console.log("Server offline");
        });
  })
  .catch(() => {
      console.log("Config load failed");
  });
</script>

</body>
</html>
